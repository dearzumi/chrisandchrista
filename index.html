<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chris & Christa</title>
    <meta
      name="description"
      content="Welcome to Chris and Christa's official website."
    />
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: radial-gradient(circle at top, #fff9f2, #f6f7fb 50%, #eef1f8);
        color: #1c1f2a;
      }

      main {
        width: min(720px, 92vw);
        text-align: center;
        padding: 3rem 1.5rem;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.78);
        backdrop-filter: blur(6px);
        border: 1px solid rgba(28, 31, 42, 0.08);
        box-shadow: 0 18px 40px rgba(20, 24, 35, 0.1);
      }

      h1 {
        font-size: clamp(2rem, 6vw, 3.25rem);
        line-height: 1.1;
        margin: 0;
        letter-spacing: -0.03em;
      }

      p {
        margin: 1rem auto 0;
        font-size: clamp(1rem, 2.3vw, 1.2rem);
        line-height: 1.6;
        max-width: 46ch;
        color: #464d63;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Chris &amp; Christa</h1>
      <p>
        Our website is now live. A full experience is coming soon, and we are
        excited to share more with you.
      </p>
    </main>
  </body>
</html>
